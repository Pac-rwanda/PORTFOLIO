<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Follow Cursor</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      color: white;
      font-family: Arial, sans-serif;
    }
    .navbar{
      width: 100%;
      height: 100px;
      display: flex;
      gap: 750px;
      position: absolute;
      background-color: black;
      align-items: center;
    }
  .nav-logo{
    width: 20%;
    height: 70%;
    border:groove;
    display: flex;
    border-bottom-right-radius: 90px;
    transition:all 2s ease;
  }
   .nav-logoa{
    width: 20%;
    height: 70%;
    border:groove;
    display: flex;
    border-bottom-left-radius: 90px;
  }
     .nav-logob{
    width: 20%;
    height: 70%;
    border:groove;
    position: absolute;
    left: 500px;
    box-sizing: border-box;
    word-break: break-word;
    display: flex;
    transition:all 2s ease;
  }
  .nav-logo:hover{
    transform:scaleX(1.1);
    border-color:aqua;
  }
  </style>
</head>
<body>
<div class="navbar">
  <div class="nav-logo"></div>
  <div class="nav-logob"></div>
  <div class="nav-logoa"></div>
</div>
</body>
</html>
